[Rainmeter]
Update=200
AccurateText=1
DynamicWindowSize=1

@IncludeVars=#@#Variables.inc
@IncludeStyles=#@#Styles.inc

; =============================================
; Hexa - CPU Monitor Module
; =============================================

[Metadata]
Name=Hexa CPU
Author=Hexa
Version=1.0
Information=CPU usage and temperature monitor

[Variables]
ProgressColor=#ColorText#

; --- Measures ---
[MeasureCPU]
Measure=CPU
UpdateDivider=25
IfCondition=MeasureCPU >= #DangerThreshold#
IfTrueAction=[!SetOption LabelValue FontColor "#ColorDanger#"][!SetVariable ProgressColor "#ColorDanger#"][!UpdateMeter LabelValue][!UpdateMeter HexProgress][!Redraw]
IfCondition2=(MeasureCPU >= #WarningThreshold#) && (MeasureCPU < #DangerThreshold#)
IfTrueAction2=[!SetOption LabelValue FontColor "#ColorWarning#"][!SetVariable ProgressColor "#ColorWarning#"][!UpdateMeter LabelValue][!UpdateMeter HexProgress][!Redraw]
IfCondition3=MeasureCPU < #WarningThreshold#
IfTrueAction3=[!SetOption LabelValue FontColor "#ColorText#"][!SetVariable ProgressColor "#ColorText#"][!UpdateMeter LabelValue][!UpdateMeter HexProgress][!Redraw]
DynamicVariables=1

[CalcCPUSmooth]
Measure=Calc
Formula=CalcCPUSmooth + (MeasureCPU - CalcCPUSmooth) * 0.4
DynamicVariables=1

[MeasureCPUTemp]
Measure=Plugin
Plugin=UsageMonitor
Category=Thermal Zone Information
Counter=Temperature
Index=0

[CalcCPUTempC]
Measure=Calc
Formula=MeasureCPUTemp - 273.15
DynamicVariables=1

; --- Hexagon Border (끔어진 헥사곤) ---
[HexBorder]
Meter=Shape
X=0
Y=0
Shape=Path HexPath | StrokeWidth #BorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,0 | StrokeDashes 38,12 | StrokeDashOffset 6 | StrokeDashCap Round
Shape2=Path HexPathInner | StrokeWidth #InnerBorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,1
HexPath=50,0 | LineTo 93.5,25 | LineTo 93.5,75 | LineTo 50,100 | LineTo 6.5,75 | LineTo 6.5,25 | ClosePath 1
HexPathInner=50,5 | LineTo 89.0,27.5 | LineTo 89.0,72.5 | LineTo 50,95 | LineTo 11.0,72.5 | LineTo 11.0,27.5 | ClosePath 1
ToolTipText=CPU 사용률: [MeasureCPU:0]%#CRLF#온도: [CalcCPUTempC:0]°C
DynamicVariables=1

; --- Progress Bar (커터칼 세그먼트 프로그레스) ---
[CalcCPUProgress]
Measure=Calc
Formula=max(0.1, CalcCPUSmooth * 1.35)
OnChangeAction=[!SetOption HexProgress Shape2 "Path ProgressPath | StrokeWidth 2 | Stroke Color #ProgressColor# | Fill Color 0,0,0,0 | StrokeDashes [CalcCPUProgress:],500 | StrokeDashCap Flat"][!UpdateMeter HexProgress][!Redraw]
DynamicVariables=1

[HexProgress]
Meter=Shape
X=0
Y=0
Shape=Path ProgressPath | StrokeWidth 2 | Stroke Color 60,60,60,80 | Fill Color 0,0,0,0 | StrokeDashes 2,1.2 | StrokeDashCap Flat
Shape2=Path ProgressPath | StrokeWidth 2 | Stroke Color #ProgressColor# | Fill Color 0,0,0,0 | StrokeDashes 0.1,500 | StrokeDashCap Flat
ProgressPath=50,5 | LineTo 89.0,27.5 | LineTo 89.0,72.5 | LineTo 50,95 | LineTo 11.0,72.5 | LineTo 11.0,27.5 | ClosePath 1
DynamicVariables=1

; --- Title ---
[LabelTitle]
Meter=String
X=50
Y=30
FontFace=#FontFace#
FontSize=#FontSizeSmall#
FontColor=#ColorSubText#
AntiAlias=1
StringAlign=Center
Text=CPU

; --- Value ---
[LabelValue]
Meter=String
MeasureName=CalcCPUSmooth
X=50
Y=47
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#ColorText#
FontWeight=700
AntiAlias=1
StringAlign=Center
Text=%1%
NumOfDecimals=0
DynamicVariables=1
