[Rainmeter]
Update=50
AccurateText=1
DynamicWindowSize=1

@IncludeVars=#@#Variables.inc
@IncludeStyles=#@#Styles.inc

; =============================================
; Hexa - Audio Visualizer Module
; 다중 동심원 육각형 + 미디어 정보
; =============================================

[Metadata]
Name=Hexa Visualizer
Author=Hexa
Version=1.0
Information=Hexagonal audio visualizer with media info

; --- Variables (local override) ---
[Variables]
; 비주얼라이저 크기 (일반 모듈보다 크게)
VizSize=200
VizCenterX=100
VizCenterY=100

; --- 윈도우 크기 유지용 플레이스홀더 ---
[Placeholder]
Meter=Image
X=0
Y=0
W=(max(200, 202+[CalcPanelWidth:]))
H=200
SolidColor=0,0,0,0
DynamicVariables=1

; --- Audio Level Measure ---
[MeasureAudio]
Measure=Plugin
Plugin=AudioLevel
Port=Output
Channel=Avg
RMSAttack=25
RMSDecay=80
RMSGain=1.5

; --- Now Playing Measures (WebNowPlaying) ---
[MeasurePlayer]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Title

[MeasureArtist]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Artist

[MeasureAlbum]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Album

[MeasurePosition]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Position

[MeasureDuration]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Duration

[MeasureProgress]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Progress

[MeasureState]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=State
DynamicVariables=1

; --- 곡 전환 시 깜빡임 방지 (2초 딜레이) ---
[CalcStateDelay]
Measure=Calc
Formula=MeasureState > 0 ? 40 : max(CalcStateDelay - 1, 0)
IfCondition=CalcStateDelay = 0
IfTrueAction=[!HideMeterGroup MediaAll]
IfCondition2=CalcStateDelay > 0
IfTrueAction2=[!ShowMeterGroup MediaAll]
DynamicVariables=1

[CalcPlayIcon]
Measure=Calc
Formula=MeasureState
IfCondition=CalcPlayIcon = 1
IfTrueAction=[!SetOption ControlPlayPause Text "[\x23F8]"][!UpdateMeter ControlPlayPause][!Redraw]
IfFalseAction=[!SetOption ControlPlayPause Text "[\x25B6]"][!UpdateMeter ControlPlayPause][!Redraw]
DynamicVariables=1

[MeasureCover]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Cover
CoverPath=#@#Cover.png
Substitute="":"#@#NoCover.png"

; --- Calc: Audio level to scale layers ---
; 파문 효과: 안쪽만 손쉽게 반응, 바깥은 강한 비트에만 번쿍
[CalcLevel1]
Measure=Calc
Formula=clamp(MeasureAudio ** 0.5, 0, 1)
MinValue=0
MaxValue=1

[CalcLevel2]
Measure=Calc
Formula=clamp(MeasureAudio ** 1.2, 0, 1)
MinValue=0
MaxValue=1

[CalcLevel3]
Measure=Calc
Formula=clamp(MeasureAudio ** 2.0, 0, 1)
MinValue=0
MaxValue=1

[CalcLevel4]
Measure=Calc
Formula=clamp(MeasureAudio ** 3.0, 0, 1)
MinValue=0
MaxValue=1

[CalcLevel5]
Measure=Calc
Formula=clamp(MeasureAudio ** 4.5, 0, 1)
MinValue=0
MaxValue=1

[CalcLevel6]
Measure=Calc
Formula=clamp(MeasureAudio ** 6.0, 0, 1)
MinValue=0
MaxValue=1

[CalcLevel7]
Measure=Calc
Formula=clamp(MeasureAudio ** 9.0, 0, 1)
MinValue=0
MaxValue=1

; --- Panel Width Auto-Calc ---
[CalcPanelWidth]
Measure=Calc
Formula=max(140, max([MediaTitle:W], max([MediaArtist:W], [MediaTime:W])) + 30)
DynamicVariables=1

; --- Media Progress Calc ---
[MeasureHexSeek]
Measure=Script
ScriptFile=#CURRENTPATH#HexSeek.lua

[CalcMediaProgress]
Measure=Calc
Formula=max(0.1, MeasureProgress * 1.104)
UpdateDivider=20
OnChangeAction=[!SetOption HexMediaProgress Shape2 "Path ProgressPath | StrokeWidth 5 | Stroke Color #VisualizerColor# | Fill Color 0,0,0,0 | StrokeDashes [CalcMediaProgress:],500 | StrokeDashCap Flat"][!UpdateMeter HexMediaProgress][!Redraw]
DynamicVariables=1

; --- 가장 바깥 육각형 (끔어진 헥사곤 + 안쪽 실선) ---
[HexOuter]
Meter=Shape
X=((1-#MediaInfoSide#)*([CalcPanelWidth:]+2))
Y=0
Shape=Path Hex5 | StrokeWidth #BorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,0 | StrokeDashes 76,24 | StrokeDashOffset 12 | StrokeDashCap Round
Shape2=Path Hex5Inner | StrokeWidth #InnerBorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,0
Hex5=100,0 | LineTo 187,50 | LineTo 187,150 | LineTo 100,200 | LineTo 13,150 | LineTo 13,50 | ClosePath 1
Hex5Inner=100,8 | LineTo 179.7,54 | LineTo 179.7,146 | LineTo 100,192 | LineTo 20.3,146 | LineTo 20.3,54 | ClosePath 1
DynamicVariables=1
Group=MediaAll

; --- Layer 5 (바깥) - 볼륨 낮을때도 약간 보임 ---

; --- Album Art (육각형 클리핑) ---
[AlbumArtImage]
Meter=Image
MeasureName=MeasureCover
X=(20+(1-#MediaInfoSide#)*([CalcPanelWidth:]+2))
Y=8
W=160
H=184
PreserveAspectRatio=2
MaskImageName=#@#Masks\HexMask.png
AntiAlias=1
DynamicVariables=1
Group=MediaAll

; --- Layer 7 (최외곽 - 강한 피크에만 반응) ---
[HexLayer7]
Meter=Shape
MeasureName=CalcLevel7
X=((1-#MediaInfoSide#)*([CalcPanelWidth:]+2))
Y=0
Shape=Path Hex7 | StrokeWidth ([CalcLevel7:]*16) | Stroke Color #VisualizerColor#,([CalcLevel7:]*180) | Fill Color 0,0,0,0
Hex7=100,14.4 | LineTo 174.1,57.2 | LineTo 174.1,142.8 | LineTo 100,185.6 | LineTo 25.9,142.8 | LineTo 25.9,57.2 | ClosePath 1
DynamicVariables=1
Group=MediaAll

; --- Layer 6 ---
[HexLayer6]
Meter=Shape
MeasureName=CalcLevel6
X=((1-#MediaInfoSide#)*([CalcPanelWidth:]+2))
Y=0
Shape=Path Hex6 | StrokeWidth ([CalcLevel6:]*12) | Stroke Color #VisualizerColor#,([CalcLevel6:]*150) | Fill Color 0,0,0,0
Hex6=100,26.4 | LineTo 163.8,63.2 | LineTo 163.8,136.8 | LineTo 100,173.6 | LineTo 36.2,136.8 | LineTo 36.2,63.2 | ClosePath 1
DynamicVariables=1
Group=MediaAll

; --- Layer 5 ---
[HexLayer5]
Meter=Shape
MeasureName=CalcLevel5
X=((1-#MediaInfoSide#)*([CalcPanelWidth:]+2))
Y=0
Shape=Path Hex5 | StrokeWidth ([CalcLevel5:]*9) | Stroke Color #VisualizerColor#,([CalcLevel5:]*120) | Fill Color 0,0,0,0
Hex5=100,38.4 | LineTo 153.4,69.2 | LineTo 153.4,130.8 | LineTo 100,161.6 | LineTo 46.6,130.8 | LineTo 46.6,69.2 | ClosePath 1
DynamicVariables=1
Group=MediaAll

; --- Layer 4 ---
[HexLayer4]
Meter=Shape
MeasureName=CalcLevel4
X=((1-#MediaInfoSide#)*([CalcPanelWidth:]+2))
Y=0
Shape=Path Hex4 | StrokeWidth ([CalcLevel4:]*7) | Stroke Color #VisualizerColor#,([CalcLevel4:]*90) | Fill Color 0,0,0,0
Hex4=100,50.3 | LineTo 143,75.2 | LineTo 143,124.8 | LineTo 100,149.7 | LineTo 57,124.8 | LineTo 57,75.2 | ClosePath 1
DynamicVariables=1
Group=MediaAll

; --- Layer 3 ---
[HexLayer3]
Meter=Shape
MeasureName=CalcLevel3
X=((1-#MediaInfoSide#)*([CalcPanelWidth:]+2))
Y=0
Shape=Path Hex3 | StrokeWidth ([CalcLevel3:]*5) | Stroke Color #VisualizerColor#,([CalcLevel3:]*70) | Fill Color 0,0,0,0
Hex3=100,62.3 | LineTo 132.7,81.1 | LineTo 132.7,118.9 | LineTo 100,137.7 | LineTo 67.3,118.9 | LineTo 67.3,81.1 | ClosePath 1
DynamicVariables=1
Group=MediaAll

; --- Layer 2 ---
[HexLayer2]
Meter=Shape
MeasureName=CalcLevel2
X=((1-#MediaInfoSide#)*([CalcPanelWidth:]+2))
Y=0
Shape=Path Hex2 | StrokeWidth ([CalcLevel2:]*3) | Stroke Color #VisualizerColor#,([CalcLevel2:]*50) | Fill Color 0,0,0,0
Hex2=100,74.2 | LineTo 122.3,87.1 | LineTo 122.3,112.9 | LineTo 100,125.8 | LineTo 77.7,112.9 | LineTo 77.7,87.1 | ClosePath 1
DynamicVariables=1
Group=MediaAll

; --- Layer 1 (가장 안쪽, 항상 반응) ---
[HexLayer1]
Meter=Shape
MeasureName=CalcLevel1
X=((1-#MediaInfoSide#)*([CalcPanelWidth:]+2))
Y=0
Shape=Path Hex1 | StrokeWidth ([CalcLevel1:]*2) | Stroke Color #VisualizerColor#,([CalcLevel1:]*35) | Fill Color 0,0,0,0
Hex1=100,86.2 | LineTo 112,93.1 | LineTo 112,106.9 | LineTo 100,113.8 | LineTo 88,106.9 | LineTo 88,93.1 | ClosePath 1
DynamicVariables=1
Group=MediaAll

; --- Media Progress Bar (커터칼 세그먼트) ---
[HexMediaProgress]
Meter=Shape
X=((1-#MediaInfoSide#)*([CalcPanelWidth:]+2))
Y=0
Shape=Path ProgressPath | StrokeWidth 5 | Stroke Color 60,60,60,80 | Fill Color 0,0,0,0 | StrokeDashes 2,1.2 | StrokeDashCap Flat
Shape2=Path ProgressPath | StrokeWidth 5 | Stroke Color #VisualizerColor# | Fill Color 0,0,0,0 | StrokeDashes 0.1,500 | StrokeDashCap Flat
ProgressPath=100,8 | LineTo 179.7,54 | LineTo 179.7,146 | LineTo 100,192 | LineTo 20.3,146 | LineTo 20.3,54 | ClosePath 1
LeftMouseDownAction=[!CommandMeasure MeasureHexSeek "DragStart($MouseX$, $MouseY$)"]
LeftMouseUpAction=[!CommandMeasure MeasureHexSeek "DragEnd()"]
MouseScrollUpAction=[!CommandMeasure MeasurePlayer "SetPosition +5"]
MouseScrollDownAction=[!CommandMeasure MeasurePlayer "SetPosition -5"]
DynamicVariables=1
Group=MediaAll

; --- 바깥 테두리 (끔어진 헥사곤 + 안쪽 실선으로 덮기) ---
[HexOuterStroke]
Meter=Shape
X=((1-#MediaInfoSide#)*([CalcPanelWidth:]+2))
Y=0
Shape=Path Hex5 | StrokeWidth #BorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,0 | StrokeDashes 76,24 | StrokeDashOffset 12 | StrokeDashCap Round
Shape2=Path Hex5Inner | StrokeWidth #InnerBorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,0
Hex5=100,0 | LineTo 187,50 | LineTo 187,150 | LineTo 100,200 | LineTo 13,150 | LineTo 13,50 | ClosePath 1
Hex5Inner=100,8 | LineTo 179.7,54 | LineTo 179.7,146 | LineTo 100,192 | LineTo 20.3,146 | LineTo 20.3,54 | ClosePath 1
DynamicVariables=1
Group=MediaAll

; --- 미디어 정보 사이드 패널 ---
[MediaLabel]
Meter=Shape
X=(#MediaInfoSide#*202)
Y=50
Shape=Rectangle 0,0,[CalcPanelWidth:],110,12 | Fill Color 0,0,0,160 | StrokeWidth 0
DynamicVariables=1
Group=MediaAll

; --- Media Title ---
[MediaTitle]
Meter=String
MeasureName=MeasurePlayer
X=(#MediaInfoSide#*202+[CalcPanelWidth:]/2)
Y=55
FontFace=#FontFace#
FontSize=16
FontColor=#ColorText#
FontWeight=700
AntiAlias=1
StringAlign=Center
Text=%1
DynamicVariables=1
Group=MediaAll

; --- Media Artist ---
[MediaArtist]
Meter=String
MeasureName=MeasureArtist
X=(#MediaInfoSide#*202+[CalcPanelWidth:]/2)
Y=76
FontFace=#FontFace#
FontSize=13
FontColor=#ColorSubText#
AntiAlias=1
StringAlign=Center
Text=%1
DynamicVariables=1
Group=MediaAll

; --- Media Time ---
[MediaTime]
Meter=String
MeasureName=MeasurePosition
MeasureName2=MeasureDuration
X=(#MediaInfoSide#*202+[CalcPanelWidth:]/2)
Y=96
FontFace=#FontFace#
FontSize=12
FontColor=#ColorSubText#
AntiAlias=1
StringAlign=Center
Text=%1 / %2
DynamicVariables=1
Group=MediaAll

; --- Playback Controls ---
[ControlPrev]
Meter=String
X=(#MediaInfoSide#*202+[CalcPanelWidth:]/2-40)
Y=118
FontFace=Segoe UI Symbol
FontSize=12
FontColor=#ColorText#
AntiAlias=1
StringAlign=Center
Text=[\x23EE]
LeftMouseUpAction=[!CommandMeasure MeasurePlayer "Previous"]
MouseOverAction=[!SetOption ControlPrev FontColor "#ColorSecondary#"][!UpdateMeter ControlPrev][!Redraw]
MouseLeaveAction=[!SetOption ControlPrev FontColor "#ColorText#"][!UpdateMeter ControlPrev][!Redraw]
DynamicVariables=1
Group=MediaAll

[ControlPlayPause]
Meter=String
X=(#MediaInfoSide#*202+[CalcPanelWidth:]/2)
Y=118
FontFace=Segoe UI Symbol
FontSize=14
FontColor=#ColorText#
AntiAlias=1
StringAlign=Center
Text=[\x25B6]
LeftMouseUpAction=[!CommandMeasure MeasurePlayer "PlayPause"]
MouseOverAction=[!SetOption ControlPlayPause FontColor "#ColorSecondary#"][!UpdateMeter ControlPlayPause][!Redraw]
MouseLeaveAction=[!SetOption ControlPlayPause FontColor "#ColorText#"][!UpdateMeter ControlPlayPause][!Redraw]
DynamicVariables=1
Group=MediaAll

[ControlNext]
Meter=String
X=(#MediaInfoSide#*202+[CalcPanelWidth:]/2+40)
Y=118
FontFace=Segoe UI Symbol
FontSize=12
FontColor=#ColorText#
AntiAlias=1
StringAlign=Center
Text=[\x23ED]
LeftMouseUpAction=[!CommandMeasure MeasurePlayer "Next"]
MouseOverAction=[!SetOption ControlNext FontColor "#ColorSecondary#"][!UpdateMeter ControlNext][!Redraw]
MouseLeaveAction=[!SetOption ControlNext FontColor "#ColorText#"][!UpdateMeter ControlNext][!Redraw]
DynamicVariables=1
Group=MediaAll
