[Rainmeter]
Update=50
AccurateText=1
DynamicWindowSize=1

@IncludeVars=#@#Variables.inc
@IncludeStyles=#@#Styles.inc

; =============================================
; Hexa - Audio Visualizer Module
; 다중 동심원 육각형 + 미디어 정보
; =============================================

[Metadata]
Name=Hexa Visualizer
Author=Hexa
Version=1.0
Information=Hexagonal audio visualizer with media info

; --- Variables (local override) ---
[Variables]
; 비주얼라이저 크기 (일반 모듈보다 크게)
VizSize=200
VizCenterX=100
VizCenterY=100
; 허니콤 스냅 그리드 배율 (200x200 → 2배 간격)
HexModuleSize=200

; --- 허니콤 스냅 ---
[ScriptSnap]
Measure=Script
ScriptFile=#@#HexSnap.lua
UpdateDivider=4

; --- 윈도우 크기 고정 (200x200 육각형 기준) ---
[Placeholder]
Meter=Image
X=0
Y=0
W=200
H=200
SolidColor=0,0,0,0

; --- Audio Level Measure ---
[MeasureAudio]
Measure=Plugin
Plugin=AudioLevel
Port=Output
Channel=Avg
RMSAttack=25
RMSDecay=80
RMSGain=6.0
FFTSize=2048
FFTOverlap=1024
FFTAttack=50
FFTDecay=300
Sensitivity=1
Bands=21
FreqMin=20
FreqMax=16000

; --- 21밴드 측정 (3개씩 묶어서 7그룹으로 사용) ---
; 로그 분포: 20Hz~16kHz, 각 밴드간 x1.39배
;
; L7(Sub-bass):  Band0-2   = 20~54Hz    킥드럼, 808
; L6(Bass):      Band3-5   = 54~146Hz   베이스 기타, 베이스 신스
; L5(Low-Mid):   Band6-8   = 146~394Hz  악기 바디감
; L4(Mid):       Band9-11  = 394~1066Hz 보컬, 기타, 피아노
; L3(Upper-Mid): Band12-14 = 1~2.9kHz   보컬 명료도, 스네어
; L2(Presence):  Band15-17 = 2.9~7.8kHz 밝기, 하이햇
; L1(Air):       Band18-20 = 7.8~16kHz  심벌, 공기감

[MeasureBand0]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band0

[MeasureBand1]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band1

[MeasureBand2]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band2

[MeasureBand3]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band3

[MeasureBand4]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band4

[MeasureBand5]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band5

[MeasureBand6]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band6

[MeasureBand7]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band7

[MeasureBand8]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band8

[MeasureBand9]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band9

[MeasureBand10]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band10

[MeasureBand11]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band11

[MeasureBand12]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band12

[MeasureBand13]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band13

[MeasureBand14]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band14

[MeasureBand15]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band15

[MeasureBand16]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band16

[MeasureBand17]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band17

[MeasureBand18]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band18

[MeasureBand19]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band19

[MeasureBand20]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Channel=Band20

; --- Now Playing Measures (WebNowPlaying) ---
[MeasurePlayer]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Title

[MeasureArtist]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Artist

[MeasureAlbum]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Album

[MeasurePosition]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Position

[MeasureDuration]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Duration

[MeasureProgress]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Progress

[MeasureState]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=State
DynamicVariables=1

; --- 곡 전환 시 깜빡임 방지 (2초 딜레이) ---
[CalcStateDelay]
Measure=Calc
Formula=MeasureState > 0 ? 40 : max(CalcStateDelay - 1, 0)
IfCondition=CalcStateDelay = 0
IfTrueAction=[!HideMeterGroup MediaAll]
IfCondition2=CalcStateDelay > 0
IfTrueAction2=[!ShowMeterGroup MediaAll]
DynamicVariables=1

[CalcPlayIcon]
Measure=Calc
Formula=MeasureState
IfCondition=CalcPlayIcon = 1
IfTrueAction=[!SetOption ControlPlayPause Text "[\x23F8]"][!UpdateMeter ControlPlayPause][!Redraw]
IfFalseAction=[!SetOption ControlPlayPause Text "[\x25B6]"][!UpdateMeter ControlPlayPause][!Redraw]
DynamicVariables=1

[MeasureCover]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Cover
CoverPath=#@#Cover.png
Substitute="":"#@#NoCover.png"

; --- Calc: 음역대별 레이어 스케일 ---
; 3밴드 평균 → 넓은 주파수 대역 포괄
; Gain 보정 + 최저감도(floor) + EMA 스무딩
[CalcLevel1]
Measure=Calc
Formula=clamp(CalcLevel1 + (max((MeasureBand18+MeasureBand19+MeasureBand20)/3 * 1.7, 0.02) - CalcLevel1) * 0.35, 0, 1)
MinValue=0
MaxValue=1
DynamicVariables=1

[CalcLevel2]
Measure=Calc
Formula=clamp(CalcLevel2 + (max((MeasureBand15+MeasureBand16+MeasureBand17)/3 * 1.4, 0.015) - CalcLevel2) * 0.35, 0, 1)
MinValue=0
MaxValue=1
DynamicVariables=1

[CalcLevel3]
Measure=Calc
Formula=clamp(CalcLevel3 + (max((MeasureBand12+MeasureBand13+MeasureBand14)/3 * 1.2, 0.01) - CalcLevel3) * 0.3, 0, 1)
MinValue=0
MaxValue=1
DynamicVariables=1

[CalcLevel4]
Measure=Calc
Formula=clamp(CalcLevel4 + (max((MeasureBand9+MeasureBand10+MeasureBand11)/3 * 1.1, 0.01) - CalcLevel4) * 0.3, 0, 1)
MinValue=0
MaxValue=1
DynamicVariables=1

[CalcLevel5]
Measure=Calc
Formula=clamp(CalcLevel5 + (max((MeasureBand6+MeasureBand7+MeasureBand8)/3 * 1.0, 0.008) - CalcLevel5) * 0.3, 0, 1)
MinValue=0
MaxValue=1
DynamicVariables=1

[CalcLevel6]
Measure=Calc
Formula=clamp(CalcLevel6 + (max((MeasureBand3+MeasureBand4+MeasureBand5)/3 * 0.9, 0.005) - CalcLevel6) * 0.25, 0, 1)
MinValue=0
MaxValue=1
DynamicVariables=1

[CalcLevel7]
Measure=Calc
Formula=clamp(CalcLevel7 + (max((MeasureBand0+MeasureBand1+MeasureBand2)/3 * 0.85, 0.005) - CalcLevel7) * 0.25, 0, 1)
MinValue=0
MaxValue=1
DynamicVariables=1

; --- Calc: 대시 길이 변환 (CalcLevel → 둘레 비례) ---
[CalcProgress1]
Measure=Calc
Formula=max(3, CalcLevel1 * 48)
DynamicVariables=1

[CalcProgress2]
Measure=Calc
Formula=max(3, CalcLevel2 * 120)
DynamicVariables=1

[CalcProgress3]
Measure=Calc
Formula=max(3, CalcLevel3 * 204)
DynamicVariables=1

[CalcProgress4]
Measure=Calc
Formula=max(3, CalcLevel4 * 276)
DynamicVariables=1

[CalcProgress5]
Measure=Calc
Formula=max(3, CalcLevel5 * 348)
DynamicVariables=1

[CalcProgress6]
Measure=Calc
Formula=max(3, CalcLevel6 * 420)
DynamicVariables=1

[CalcProgress7]
Measure=Calc
Formula=max(3, CalcLevel7 * 504)
DynamicVariables=1

; --- Panel Width Auto-Calc ---
[CalcPanelWidth]
Measure=Calc
Formula=max(140, max([MediaTitle:W], max([MediaArtist:W], [MediaTime:W])) + 30)
DynamicVariables=1

; --- Media Progress Calc ---
[MeasureHexSeek]
Measure=Script
ScriptFile=#CURRENTPATH#HexSeek.lua

[CalcMediaProgress]
Measure=Calc
Formula=max(0.1, MeasureProgress * 1.104)
UpdateDivider=20
OnChangeAction=[!SetOption HexMediaProgress Shape2 "Path ProgressPath | StrokeWidth 5 | Stroke Color #VisualizerColor# | Fill Color 0,0,0,0 | StrokeDashes [CalcMediaProgress:],500 | StrokeDashCap Flat"][!UpdateMeter HexMediaProgress][!Redraw]
DynamicVariables=1

; --- 가장 바깥 육각형 (끔어진 헥사곤 + 안쪽 실선) ---
[HexOuter]
Meter=Shape
X=((1-#MediaInfoSide#)*([CalcPanelWidth:]-10))
Y=0
Shape=Path Hex5 | StrokeWidth #BorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,0 | StrokeDashes 76,24 | StrokeDashOffset 12 | StrokeDashCap Round
Shape2=Path Hex5Inner | StrokeWidth #InnerBorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,0
Hex5=100,0 | LineTo 187,50 | LineTo 187,150 | LineTo 100,200 | LineTo 13,150 | LineTo 13,50 | ClosePath 1
Hex5Inner=100,8 | LineTo 179.7,54 | LineTo 179.7,146 | LineTo 100,192 | LineTo 20.3,146 | LineTo 20.3,54 | ClosePath 1
DynamicVariables=1

; --- Layer 5 (바깥) - 볼륨 낮을때도 약간 보임 ---

; --- Album Art (육각형 클리핑) ---
[AlbumArtImage]
Meter=Image
MeasureName=MeasureCover
X=(20+(1-#MediaInfoSide#)*([CalcPanelWidth:]-10))
Y=8
W=160
H=184
PreserveAspectRatio=2
MaskImageName=#@#Masks\HexMask.png
AntiAlias=1
DynamicVariables=1
Group=MediaAll

; --- Layer 7 (최외곽, 서브베이스 20-54Hz) ---
[HexLayer7]
Meter=Shape
X=((1-#MediaInfoSide#)*([CalcPanelWidth:]-10))
Y=0
Shape=Path Hex7 | StrokeWidth 1.5 | Stroke Color 60,60,60,30 | Fill Color 0,0,0,0 | StrokeDashes 2,1.2 | StrokeDashCap Flat
Shape2=Path Hex7 | StrokeWidth (1+[CalcLevel7:]*5) | Stroke Color #VisualizerColor#,([CalcLevel7:]*90) | Fill Color 0,0,0,0 | StrokeDashes [CalcProgress7:],500 | StrokeDashCap Flat
Hex7=100,16 | LineTo 172.7,58 | LineTo 172.7,142 | LineTo 100,184 | LineTo 27.3,142 | LineTo 27.3,58 | ClosePath 1
DynamicVariables=1

; --- Layer 6 (베이스 54-146Hz) ---
[HexLayer6]
Meter=Shape
X=((1-#MediaInfoSide#)*([CalcPanelWidth:]-10))
Y=0
Shape=Path Hex6 | StrokeWidth 1.5 | Stroke Color 60,60,60,30 | Fill Color 0,0,0,0 | StrokeDashes 2,1.2 | StrokeDashCap Flat
Shape2=Path Hex6 | StrokeWidth (1+[CalcLevel6:]*5) | Stroke Color #VisualizerColor#,([CalcLevel6:]*90) | Fill Color 0,0,0,0 | StrokeDashes [CalcProgress6:],500 | StrokeDashCap Flat
Hex6=100,170 | LineTo 39.4,135 | LineTo 39.4,65 | LineTo 100,30 | LineTo 160.6,65 | LineTo 160.6,135 | ClosePath 1
DynamicVariables=1

; --- Layer 5 (로우미드 146-394Hz) ---
[HexLayer5]
Meter=Shape
X=((1-#MediaInfoSide#)*([CalcPanelWidth:]-10))
Y=0
Shape=Path Hex5 | StrokeWidth 1.5 | Stroke Color 60,60,60,30 | Fill Color 0,0,0,0 | StrokeDashes 2,1.2 | StrokeDashCap Flat
Shape2=Path Hex5 | StrokeWidth (1+[CalcLevel5:]*5) | Stroke Color #VisualizerColor#,([CalcLevel5:]*90) | Fill Color 0,0,0,0 | StrokeDashes [CalcProgress5:],500 | StrokeDashCap Flat
Hex5=100,42 | LineTo 150.2,71 | LineTo 150.2,129 | LineTo 100,158 | LineTo 49.8,129 | LineTo 49.8,71 | ClosePath 1
DynamicVariables=1

; --- Layer 4 (미드 394-1066Hz) ---
[HexLayer4]
Meter=Shape
X=((1-#MediaInfoSide#)*([CalcPanelWidth:]-10))
Y=0
Shape=Path Hex4 | StrokeWidth 1.5 | Stroke Color 60,60,60,30 | Fill Color 0,0,0,0 | StrokeDashes 2,1.2 | StrokeDashCap Flat
Shape2=Path Hex4 | StrokeWidth (1+[CalcLevel4:]*5) | Stroke Color #VisualizerColor#,([CalcLevel4:]*90) | Fill Color 0,0,0,0 | StrokeDashes [CalcProgress4:],500 | StrokeDashCap Flat
Hex4=100,146 | LineTo 60.2,123 | LineTo 60.2,77 | LineTo 100,54 | LineTo 139.8,77 | LineTo 139.8,123 | ClosePath 1
DynamicVariables=1

; --- Layer 3 (어퍼미드 1-2.9kHz) ---
[HexLayer3]
Meter=Shape
X=((1-#MediaInfoSide#)*([CalcPanelWidth:]-10))
Y=0
Shape=Path Hex3 | StrokeWidth 1.5 | Stroke Color 60,60,60,30 | Fill Color 0,0,0,0 | StrokeDashes 2,1.2 | StrokeDashCap Flat
Shape2=Path Hex3 | StrokeWidth (1+[CalcLevel3:]*5) | Stroke Color #VisualizerColor#,([CalcLevel3:]*90) | Fill Color 0,0,0,0 | StrokeDashes [CalcProgress3:],500 | StrokeDashCap Flat
Hex3=100,66 | LineTo 129.4,83 | LineTo 129.4,117 | LineTo 100,134 | LineTo 70.6,117 | LineTo 70.6,83 | ClosePath 1
DynamicVariables=1

; --- Layer 2 (프레전스 2.9-7.8kHz) ---
[HexLayer2]
Meter=Shape
X=((1-#MediaInfoSide#)*([CalcPanelWidth:]-10))
Y=0
Shape=Path Hex2 | StrokeWidth 1.5 | Stroke Color 60,60,60,30 | Fill Color 0,0,0,0 | StrokeDashes 2,1.2 | StrokeDashCap Flat
Shape2=Path Hex2 | StrokeWidth (1+[CalcLevel2:]*5) | Stroke Color #VisualizerColor#,([CalcLevel2:]*90) | Fill Color 0,0,0,0 | StrokeDashes [CalcProgress2:],500 | StrokeDashCap Flat
Hex2=100,120 | LineTo 82.7,110 | LineTo 82.7,90 | LineTo 100,80 | LineTo 117.3,90 | LineTo 117.3,110 | ClosePath 1
DynamicVariables=1

; --- Layer 1 (가장 안쪽, 에어/트레블 7.8-16kHz) ---
[HexLayer1]
Meter=Shape
X=((1-#MediaInfoSide#)*([CalcPanelWidth:]-10))
Y=0
Shape=Path Hex1 | StrokeWidth 1.5 | Stroke Color 60,60,60,30 | Fill Color 0,0,0,0 | StrokeDashes 2,1.2 | StrokeDashCap Flat
Shape2=Path Hex1 | StrokeWidth (1+[CalcLevel1:]*5) | Stroke Color #VisualizerColor#,([CalcLevel1:]*90) | Fill Color 0,0,0,0 | StrokeDashes [CalcProgress1:],500 | StrokeDashCap Flat
Hex1=100,92 | LineTo 106.9,96 | LineTo 106.9,104 | LineTo 100,108 | LineTo 93.1,104 | LineTo 93.1,96 | ClosePath 1
DynamicVariables=1

; --- Media Progress Bar (커터칼 세그먼트) ---
[HexMediaProgress]
Meter=Shape
X=((1-#MediaInfoSide#)*([CalcPanelWidth:]-10))
Y=0
Shape=Path ProgressPath | StrokeWidth 5 | Stroke Color 60,60,60,80 | Fill Color 0,0,0,0 | StrokeDashes 2,1.2 | StrokeDashCap Flat
Shape2=Path ProgressPath | StrokeWidth 5 | Stroke Color #VisualizerColor# | Fill Color 0,0,0,0 | StrokeDashes 0.1,500 | StrokeDashCap Flat
ProgressPath=100,8 | LineTo 179.7,54 | LineTo 179.7,146 | LineTo 100,192 | LineTo 20.3,146 | LineTo 20.3,54 | ClosePath 1
LeftMouseDownAction=[!CommandMeasure MeasureHexSeek "DragStart($MouseX$, $MouseY$)"]
LeftMouseUpAction=[!CommandMeasure MeasureHexSeek "DragEnd()"]
MouseScrollUpAction=[!CommandMeasure MeasurePlayer "SetPosition +5"]
MouseScrollDownAction=[!CommandMeasure MeasurePlayer "SetPosition -5"]
DynamicVariables=1
Group=MediaAll

; --- 바깥 테두리 (끔어진 헥사곤 + 안쪽 실선으로 덮기) ---
[HexOuterStroke]
Meter=Shape
X=((1-#MediaInfoSide#)*([CalcPanelWidth:]-10))
Y=0
Shape=Path Hex5 | StrokeWidth #BorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,0 | StrokeDashes 76,24 | StrokeDashOffset 12 | StrokeDashCap Round
Shape2=Path Hex5Inner | StrokeWidth #InnerBorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,0
Hex5=100,0 | LineTo 187,50 | LineTo 187,150 | LineTo 100,200 | LineTo 13,150 | LineTo 13,50 | ClosePath 1
Hex5Inner=100,8 | LineTo 179.7,54 | LineTo 179.7,146 | LineTo 100,192 | LineTo 20.3,146 | LineTo 20.3,54 | ClosePath 1
DynamicVariables=1

; --- 미디어 정보 사이드 패널 ---
[MediaLabel]
Meter=Shape
X=(#MediaInfoSide#*190)
Y=50
Shape=Rectangle 0,0,[CalcPanelWidth:],110,12 | Fill Color 0,0,0,160 | StrokeWidth 0
DynamicVariables=1
Group=MediaAll

; --- Media Title ---
[MediaTitle]
Meter=String
MeasureName=MeasurePlayer
X=(#MediaInfoSide#*190+[CalcPanelWidth:]/2)
Y=55
FontFace=#FontFace#
FontSize=16
FontColor=#ColorText#
FontWeight=700
AntiAlias=1
StringAlign=Center
Text=%1
DynamicVariables=1
Group=MediaAll

; --- Media Artist ---
[MediaArtist]
Meter=String
MeasureName=MeasureArtist
X=(#MediaInfoSide#*190+[CalcPanelWidth:]/2)
Y=76
FontFace=#FontFace#
FontSize=13
FontColor=#ColorSubText#
AntiAlias=1
StringAlign=Center
Text=%1
DynamicVariables=1
Group=MediaAll

; --- Media Time ---
[MediaTime]
Meter=String
MeasureName=MeasurePosition
MeasureName2=MeasureDuration
X=(#MediaInfoSide#*190+[CalcPanelWidth:]/2)
Y=96
FontFace=#FontFace#
FontSize=12
FontColor=#ColorSubText#
AntiAlias=1
StringAlign=Center
Text=%1 / %2
DynamicVariables=1
Group=MediaAll

; --- Playback Controls ---
[ControlPrev]
Meter=String
X=(#MediaInfoSide#*190+[CalcPanelWidth:]/2-40)
Y=118
FontFace=Segoe UI Symbol
FontSize=12
FontColor=#ColorText#
AntiAlias=1
StringAlign=Center
Text=[\x23EE]
LeftMouseUpAction=[!CommandMeasure MeasurePlayer "Previous"]
MouseOverAction=[!SetOption ControlPrev FontColor "#ColorSecondary#"][!UpdateMeter ControlPrev][!Redraw]
MouseLeaveAction=[!SetOption ControlPrev FontColor "#ColorText#"][!UpdateMeter ControlPrev][!Redraw]
DynamicVariables=1
Group=MediaAll

[ControlPlayPause]
Meter=String
X=(#MediaInfoSide#*190+[CalcPanelWidth:]/2)
Y=118
FontFace=Segoe UI Symbol
FontSize=14
FontColor=#ColorText#
AntiAlias=1
StringAlign=Center
Text=[\x25B6]
LeftMouseUpAction=[!CommandMeasure MeasurePlayer "PlayPause"]
MouseOverAction=[!SetOption ControlPlayPause FontColor "#ColorSecondary#"][!UpdateMeter ControlPlayPause][!Redraw]
MouseLeaveAction=[!SetOption ControlPlayPause FontColor "#ColorText#"][!UpdateMeter ControlPlayPause][!Redraw]
DynamicVariables=1
Group=MediaAll

[ControlNext]
Meter=String
X=(#MediaInfoSide#*190+[CalcPanelWidth:]/2+40)
Y=118
FontFace=Segoe UI Symbol
FontSize=12
FontColor=#ColorText#
AntiAlias=1
StringAlign=Center
Text=[\x23ED]
LeftMouseUpAction=[!CommandMeasure MeasurePlayer "Next"]
MouseOverAction=[!SetOption ControlNext FontColor "#ColorSecondary#"][!UpdateMeter ControlNext][!Redraw]
MouseLeaveAction=[!SetOption ControlNext FontColor "#ColorText#"][!UpdateMeter ControlNext][!Redraw]
DynamicVariables=1
Group=MediaAll
