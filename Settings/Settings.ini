Plugin=InputText
X=130
Y=180
W=80
H=20
FontFace=#FontFace#
FontSize=10
DefaultValue=#ColorBackground#
Command1=[!WriteKeyValue Variables ColorBackground "$UserInput$" "#@#Variables.inc"][!RefreshApp]

[MeasureInputColorAccent]
