Plugin=InputText
X=130
Y=150
W=80
H=20
FontFace=#FontFace#
FontSize=10
DefaultValue=#ColorBorder#
Command1=[!WriteKeyValue Variables ColorBorder "$UserInput$" "#@#Variables.inc"][!RefreshApp]

[MeasureInputColorBg]
