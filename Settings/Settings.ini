[Rainmeter]
Update=#UpdateRate#
AccurateText=1
DynamicWindowSize=1

@IncludeVars=#@#Variables.inc
@IncludeStyles=#@#Styles.inc

; =============================================
; Hexa - Settings Module
; 스킨 설정 변경 UI
; =============================================

[Metadata]
Name=Hexa Settings
Author=Hexa
Version=1.0
Information=Skin settings panel

; --- InputText Plugin (값 입력용) ---
[MeasureInputHexWidth]
Measure=Plugin
Plugin=InputText
X=130
Y=30
W=80
H=20
FontFace=#FontFace#
FontSize=10
DefaultValue=#HexWidth#
Command1=[!WriteKeyValue Variables HexWidth "$UserInput$" "#@#Variables.inc"][!RefreshApp]

[MeasureInputHexHeight]
Measure=Plugin
Plugin=InputText
X=130
Y=60
W=80
H=20
FontFace=#FontFace#
FontSize=10
DefaultValue=#HexHeight#
Command1=[!WriteKeyValue Variables HexHeight "$UserInput$" "#@#Variables.inc"][!RefreshApp]

[MeasureInputDockCols]
Measure=Plugin
Plugin=InputText
X=130
Y=90
W=80
H=20
FontFace=#FontFace#
FontSize=10
DefaultValue=#DockColumns#
Command1=[!WriteKeyValue Variables DockColumns "$UserInput$" "#@#Variables.inc"][!RefreshApp]

[MeasureInputDockRows]
Measure=Plugin
Plugin=InputText
X=130
Y=120
W=80
H=20
FontFace=#FontFace#
FontSize=10
DefaultValue=#DockRows#
Command1=[!WriteKeyValue Variables DockRows "$UserInput$" "#@#Variables.inc"][!RefreshApp]

[MeasureInputColorBorder]
