Plugin=InputText
X=130
Y=210
W=80
H=20
FontFace=#FontFace#
FontSize=10
DefaultValue=#ColorSecondary#
Command1=[!WriteKeyValue Variables ColorSecondary "$UserInput$" "#@#Variables.inc"][!RefreshApp]

[MeasureInputBorderWidth]
