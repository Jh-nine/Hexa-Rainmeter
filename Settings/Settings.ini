Plugin=InputText
X=130
Y=240
W=80
H=20
FontFace=#FontFace#
FontSize=10
DefaultValue=#BorderWidth#
Command1=[!WriteKeyValue Variables BorderWidth "$UserInput$" "#@#Variables.inc"][!RefreshApp]

; --- Background ---
[Background]
Meter=Shape
X=0
Y=0
Shape=Rectangle 0,0,250,310,8 | StrokeWidth 1 | Stroke Color #ColorBorder# | Fill Color #ColorBackground#

; --- Title ---
[Title]
Meter=String
X=125
Y=5
FontFace=#FontFace#
FontSize=12
FontColor=#ColorText#
FontWeight=700
AntiAlias=1
StringAlign=Center
Text=? Hexa Settings

; --- Setting Items ---
[LabelHexW]
Meter=String
X=10
Y=32
FontFace=#FontFace#
FontSize=10
FontColor=#ColorSubText#
AntiAlias=1
Text=Hex Width

[ValueHexW]
Meter=String
X=130
Y=32
W=80
FontFace=#FontFace#
FontSize=10
FontColor=#ColorText#
AntiAlias=1
Text=#HexWidth#
LeftMouseUpAction=[!CommandMeasure MeasureInputHexWidth "ExecuteBatch 1"]
DynamicVariables=1

[LabelHexH]
Meter=String
X=10
Y=62
FontFace=#FontFace#
FontSize=10
FontColor=#ColorSubText#
