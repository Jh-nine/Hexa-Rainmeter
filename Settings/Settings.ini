; --- Close Button ---
[CloseBtn]
Meter=String
X=235
Y=5
FontFace=#FontFace#
FontSize=12
FontColor=#ColorDanger#
AntiAlias=1
StringAlign=Center
Text=?
LeftMouseUpAction=[!DeactivateConfig]
MouseOverAction=[!SetOption CloseBtn FontColor "255,120,120,255"][!UpdateMeter CloseBtn][!Redraw]
MouseLeaveAction=[!SetOption CloseBtn FontColor "#ColorDanger#"][!UpdateMeter CloseBtn][!Redraw]
