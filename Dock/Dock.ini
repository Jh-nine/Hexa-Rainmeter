MouseLeaveAction=[!SetOption HexApp3 Shape "Path HexPath | StrokeWidth #BorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,0 | StrokeDashes 38,12 | StrokeDashOffset 6 | StrokeDashCap Round"][!SetOption HexApp3 Shape2 "Path HexPathInner | StrokeWidth #InnerBorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,0"][!UpdateMeter HexApp3][!Redraw]
