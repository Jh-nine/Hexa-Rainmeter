[Rainmeter]
Update=#UpdateRate#
AccurateText=1
DynamicWindowSize=1

@IncludeVars=#@#Variables.inc
@IncludeStyles=#@#Styles.inc
@IncludeApps=#@#AppList.inc

; =============================================
; Hexa - App Dock Module
; 가로 배치 아이콘 독
; =============================================

[Metadata]
Name=Hexa App Dock
Author=Hexa
Version=1.0
Information=Honeycomb app launcher dock

[Variables]
DockSpacing=96

; --- Launch Measures (기본 브라우저로 URL 실행) ---
[MeasureLaunch1]
Measure=Plugin
Plugin=RunCommand
Program=cmd.exe
Parameter=/c start "" "#AppUrl_1#"
State=Hide
OutputType=ANSI
DynamicVariables=1

[MeasureLaunch2]
Measure=Plugin
Plugin=RunCommand
Program=cmd.exe
Parameter=/c start "" "chrome" --profile-directory=Default --app-id=#AppId_2#
State=Hide
OutputType=ANSI
DynamicVariables=1

[MeasureLaunch3]
Measure=Plugin
Plugin=RunCommand
Program=cmd.exe
Parameter=/c start "" "chrome" --profile-directory=Default --app-id=#AppId_3#
State=Hide
OutputType=ANSI
DynamicVariables=1

; =============================================
; App 1
; =============================================
[HexApp1]
Meter=Shape
X=0
Y=0
Shape=Path HexPath | StrokeWidth #BorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,0 | StrokeDashes 38,12 | StrokeDashOffset 6 | StrokeDashCap Round
Shape2=Path HexPathInner | StrokeWidth #InnerBorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,0
HexPath=50,0 | LineTo 93.5,25 | LineTo 93.5,75 | LineTo 50,100 | LineTo 6.5,75 | LineTo 6.5,25 | ClosePath 1
HexPathInner=50,5 | LineTo 89.0,27.5 | LineTo 89.0,72.5 | LineTo 50,95 | LineTo 11.0,72.5 | LineTo 11.0,27.5 | ClosePath 1
DynamicVariables=1

[IconApp1]
Meter=Image
ImageName=#AppIcon_1#
X=25
Y=25
W=50
H=50
PreserveAspectRatio=1
AntiAlias=1
DynamicVariables=1

[HitApp1]
Meter=Shape
X=0
Y=0
Shape=Path HitHex | StrokeWidth 0 | Fill Color 0,0,0,1
HitHex=50,5 | LineTo 89,27.5 | LineTo 89,72.5 | LineTo 50,95 | LineTo 11,72.5 | LineTo 11,27.5 | ClosePath 1
LeftMouseUpAction=[!CommandMeasure MeasureLaunch1 "Run"]
MouseOverAction=[!SetOption HexApp1 Shape "Path HexPath | StrokeWidth #BorderWidth# | Stroke Color #ColorSecondary# | Fill Color 0,0,0,0 | StrokeDashes 38,12 | StrokeDashOffset 6 | StrokeDashCap Round"][!SetOption HexApp1 Shape2 "Path HexPathInner | StrokeWidth #InnerBorderWidth# | Stroke Color #ColorSecondary# | Fill Color 0,0,0,0"][!UpdateMeter HexApp1][!Redraw]
MouseLeaveAction=[!SetOption HexApp1 Shape "Path HexPath | StrokeWidth #BorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,0 | StrokeDashes 38,12 | StrokeDashOffset 6 | StrokeDashCap Round"][!SetOption HexApp1 Shape2 "Path HexPathInner | StrokeWidth #InnerBorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,0"][!UpdateMeter HexApp1][!Redraw]
DynamicVariables=1
ToolTipText=#AppName_1#

; =============================================
; App 2
; =============================================
[HexApp2]
Meter=Shape
X=#DockSpacing#
Y=0
Shape=Path HexPath | StrokeWidth #BorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,0 | StrokeDashes 38,12 | StrokeDashOffset 6 | StrokeDashCap Round
Shape2=Path HexPathInner | StrokeWidth #InnerBorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,0
HexPath=50,0 | LineTo 93.5,25 | LineTo 93.5,75 | LineTo 50,100 | LineTo 6.5,75 | LineTo 6.5,25 | ClosePath 1
HexPathInner=50,5 | LineTo 89.0,27.5 | LineTo 89.0,72.5 | LineTo 50,95 | LineTo 11.0,72.5 | LineTo 11.0,27.5 | ClosePath 1
DynamicVariables=1

[IconApp2]
Meter=Image
ImageName=#AppIcon_2#
X=(#DockSpacing#+25)
Y=25
W=50
H=50
PreserveAspectRatio=1
AntiAlias=1
DynamicVariables=1

[HitApp2]
Meter=Shape
X=#DockSpacing#
Y=0
Shape=Path HitHex | StrokeWidth 0 | Fill Color 0,0,0,1
HitHex=50,5 | LineTo 89,27.5 | LineTo 89,72.5 | LineTo 50,95 | LineTo 11,72.5 | LineTo 11,27.5 | ClosePath 1
LeftMouseUpAction=[!CommandMeasure MeasureLaunch2 "Run"]
MouseOverAction=[!SetOption HexApp2 Shape "Path HexPath | StrokeWidth #BorderWidth# | Stroke Color #ColorSecondary# | Fill Color 0,0,0,0 | StrokeDashes 38,12 | StrokeDashOffset 6 | StrokeDashCap Round"][!SetOption HexApp2 Shape2 "Path HexPathInner | StrokeWidth #InnerBorderWidth# | Stroke Color #ColorSecondary# | Fill Color 0,0,0,0"][!UpdateMeter HexApp2][!Redraw]
MouseLeaveAction=[!SetOption HexApp2 Shape "Path HexPath | StrokeWidth #BorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,0 | StrokeDashes 38,12 | StrokeDashOffset 6 | StrokeDashCap Round"][!SetOption HexApp2 Shape2 "Path HexPathInner | StrokeWidth #InnerBorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,0"][!UpdateMeter HexApp2][!Redraw]
DynamicVariables=1
ToolTipText=#AppName_2#

; =============================================
; App 3
