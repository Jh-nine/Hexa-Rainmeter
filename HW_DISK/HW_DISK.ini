[Rainmeter]
Update=200
AccurateText=1
DynamicWindowSize=1

@IncludeVars=#@#Variables.inc
@IncludeStyles=#@#Styles.inc

; =============================================
; Hexa - Disk Monitor Module
; =============================================

[Metadata]
Name=Hexa DISK
Author=Hexa
Version=1.0
Information=Disk usage monitor

[Variables]
ProgressColor=#ColorText#

; --- Measures ---
[MeasureDiskUsed]
Measure=FreeDiskSpace
Drive=C:
InvertMeasure=1
UpdateDivider=25

[MeasureDiskTotal]
Measure=FreeDiskSpace
Drive=C:
Total=1
UpdateDivider=25

[CalcDISKPercent]
Measure=Calc
Formula=(MeasureDiskUsed / MeasureDiskTotal) * 100
IfCondition=CalcDISKPercent >= #DangerThreshold#
IfTrueAction=[!SetOption LabelValue FontColor "#ColorDanger#"][!SetVariable ProgressColor "#ColorDanger#"][!UpdateMeter LabelValue][!UpdateMeter HexProgress][!Redraw]
IfCondition2=(CalcDISKPercent >= #WarningThreshold#) && (CalcDISKPercent < #DangerThreshold#)
IfTrueAction2=[!SetOption LabelValue FontColor "#ColorWarning#"][!SetVariable ProgressColor "#ColorWarning#"][!UpdateMeter LabelValue][!UpdateMeter HexProgress][!Redraw]
IfCondition3=CalcDISKPercent < #WarningThreshold#
IfTrueAction3=[!SetOption LabelValue FontColor "#ColorText#"][!SetVariable ProgressColor "#ColorText#"][!UpdateMeter LabelValue][!UpdateMeter HexProgress][!Redraw]
DynamicVariables=1

[CalcDISKSmooth]
Measure=Calc
Formula=CalcDISKSmooth + (CalcDISKPercent - CalcDISKSmooth) * 0.4
DynamicVariables=1

[CalcDiskUsedGB]
Measure=Calc
Formula=MeasureDiskUsed / 1073741824
DynamicVariables=1

[CalcDiskTotalGB]
Measure=Calc
Formula=MeasureDiskTotal / 1073741824
DynamicVariables=1

[CalcDiskFreeGB]
Measure=Calc
Formula=(MeasureDiskTotal - MeasureDiskUsed) / 1073741824
DynamicVariables=1

; --- Hexagon Border (끔어진 헥사곤) ---
[HexBorder]
Meter=Shape
X=0
Y=0
Shape=Path HexPath | StrokeWidth #BorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,0 | StrokeDashes 38,12 | StrokeDashOffset 6 | StrokeDashCap Round
Shape2=Path HexPathInner | StrokeWidth #InnerBorderWidth# | Stroke Color #ColorBorder# | Fill Color 0,0,0,1
HexPath=50,0 | LineTo 93.5,25 | LineTo 93.5,75 | LineTo 50,100 | LineTo 6.5,75 | LineTo 6.5,25 | ClosePath 1
HexPathInner=50,5 | LineTo 89.0,27.5 | LineTo 89.0,72.5 | LineTo 50,95 | LineTo 11.0,72.5 | LineTo 11.0,27.5 | ClosePath 1
ToolTipText=디스크(C:): [CalcDiskUsedGB:1] / [CalcDiskTotalGB:1] GB#CRLF#잔여 용량: [CalcDiskFreeGB:1] GB#CRLF#사용률: [CalcDISKPercent:0]%
DynamicVariables=1

; --- Progress Bar (커터칼 세그먼트 프로그레스) ---
[CalcDISKProgress]
Measure=Calc
Formula=max(0.1, CalcDISKSmooth * 1.35)
OnChangeAction=[!SetOption HexProgress Shape2 "Path ProgressPath | StrokeWidth 2 | Stroke Color #ProgressColor# | Fill Color 0,0,0,0 | StrokeDashes [CalcDISKProgress:],500 | StrokeDashCap Flat"][!UpdateMeter HexProgress][!Redraw]
DynamicVariables=1

[HexProgress]
Meter=Shape
X=0
Y=0
Shape=Path ProgressPath | StrokeWidth 2 | Stroke Color 60,60,60,80 | Fill Color 0,0,0,0 | StrokeDashes 2,1.2 | StrokeDashCap Flat
Shape2=Path ProgressPath | StrokeWidth 2 | Stroke Color #ProgressColor# | Fill Color 0,0,0,0 | StrokeDashes 0.1,500 | StrokeDashCap Flat
ProgressPath=50,5 | LineTo 89.0,27.5 | LineTo 89.0,72.5 | LineTo 50,95 | LineTo 11.0,72.5 | LineTo 11.0,27.5 | ClosePath 1
DynamicVariables=1

; --- Title ---
[LabelTitle]
Meter=String
X=50
Y=30
FontFace=#FontFace#
FontSize=#FontSizeSmall#
FontColor=#ColorSubText#
AntiAlias=1
StringAlign=Center
Text=DISK

; --- Value ---
[LabelValue]
Meter=String
MeasureName=CalcDISKSmooth
X=50
Y=47
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#ColorText#
FontWeight=700
AntiAlias=1
StringAlign=Center
Text=%1%
NumOfDecimals=0
DynamicVariables=1
